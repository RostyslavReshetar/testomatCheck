name: Playwright Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Sync tests to Testomat
        env:
          TESTOMATIO: ${{ secrets.TESTOMATIO_PROJECT_TOKEN }}
        run: npx check-tests Playwright "**/*{.,_}{test,spec}.ts" --dir ./tests --typescript

      - name: Run tests
        env:
          TESTOMATIO_PROJECT_TOKEN: ${{ secrets.TESTOMATIO_PROJECT_TOKEN }}
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
